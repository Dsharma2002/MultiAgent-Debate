# ─── Shared Vocabulary Schema ──────────────────────────────────────────────────

vocabulary:
  summary:
    type: string
    required: true
    description: "Brief summary of agent contribution"

  claims:
    type: list
    required: false
    description: "Proposed claims, designs, or requirements"

  assumptions:
    type: list
    required: false
    description: "Assumptions made"

  uncertainties:
    type: list
    required: false
    description: "Areas of uncertainty"

  evidence:
    type: list
    required: false
    description: "Evidence supporting claims"

  recommended_next_action:
    type: string
    required: false
    description: "Recommendation for next step"

  blockers:
    type: list
    required: false
    description: "Blockers requiring loopback"
    
  # Adding fallback for testing context dict (which creates a proposal_id)
  proposal_id:
    type: string
    required: false
    description: "Legacy proposal ID for testing context compatibility"
