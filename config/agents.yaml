# ─── Agent Definitions ─────────────────────────────────────────────────────────

agents:
  - agent_id: discovery
    agent_type: discovery
    name: "Discovery Agent"
    core_specialty: "Gather the business problem and identify stakeholders."
    audit_constraints: ["constraint_01"]

  - agent_id: business_analyst
    agent_type: business_analyst
    name: "Business Analyst Agent"
    core_specialty: "Convert discovery into requirements and user stories."
    audit_constraints: ["constraint_01"]

  - agent_id: solution_deviser
    agent_type: solution_deviser
    name: "Solution Deviser Agent"
    core_specialty: "Generate solution options and tradeoffs."
    audit_constraints: ["constraint_01"]

  - agent_id: technical_architect
    agent_type: technical_architect
    name: "Technical Architect Agent"
    core_specialty: "Design system APIs and modules."
    audit_constraints: ["constraint_01"]

  - agent_id: data_integration
    agent_type: data_integration
    name: "Data / Integration Agent"
    core_specialty: "Data contracts, sources, and permissions."
    audit_constraints: ["constraint_01"]

  - agent_id: builder
    agent_type: builder
    name: "Builder Agent"
    core_specialty: "Implement approved design."
    audit_constraints: ["constraint_01"]

  - agent_id: test_qa
    agent_type: test_qa
    name: "Test / QA Agent"
    core_specialty: "Write and run tests."
    audit_constraints: ["constraint_01"]

  - agent_id: verifier
    agent_type: verifier
    name: "Verifier / Critic Agent"
    core_specialty: "Challenge assumptions and find contradictions."
    audit_constraints: ["constraint_01"]

  - agent_id: business_reviewer
    agent_type: business_reviewer
    name: "Business Reviewer Agent"
    core_specialty: "Check implementation against business needs."
    audit_constraints: ["constraint_01"]

  - agent_id: compliance_risk
    agent_type: compliance_risk
    name: "Compliance / Risk Agent"
    core_specialty: "Check governance and privacy constraints."
    audit_constraints: ["constraint_01"]

  - agent_id: synthesizer
    agent_type: synthesizer
    name: "Synthesizer / Program Lead"
    core_specialty: "Merge outputs and resolve disagreements."
    audit_constraints: ["constraint_01"]

# ─── Pipeline Configuration ────────────────────────────────────────────────────
pipeline:
  execution_order:
    - discovery
    - business_analyst
    - solution_deviser
    - technical_architect
    - data_integration
    - builder
    - test_qa
    - verifier
    - business_reviewer
    - compliance_risk
    - synthesizer
  min_peer_validations: 1
  max_retry_on_reject: 1
